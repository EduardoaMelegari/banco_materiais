services:
  postgres:
    image: postgres:16-alpine
    container_name: banco_materiais_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: banco_materiais
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
